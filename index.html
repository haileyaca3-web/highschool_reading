<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>헤일리 고등학교 모의고사</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#13233f;--navy2:#1e3a63;--navy3:#2b4f82;--gold:#c9a24b;--gold-soft:#e7d3a1;
--bg:#eef1f6;--paper:#fff;--ink:#16202f;--muted:#6c7a90;--ok:#1f8a55;--ok-bg:#e7f5ec;--no:#c0492f;--no-bg:#fbeae6;--line:#dde3ec;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Jua','Quicksand','Noto Sans KR',sans-serif;-webkit-text-size-adjust:100%;}
.serif{font-family:'Jua',serif;}
.wrap{max-width:760px;margin:0 auto;padding:0 16px 160px;}
header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;padding:16px;position:sticky;top:0;z-index:50;box-shadow:0 2px 14px rgba(19,35,63,.25);}
.hwrap{max-width:760px;margin:0 auto;display:flex;align-items:center;gap:12px;}
.back{background:rgba(255,255,255,.12);border:none;color:#fff;font-size:22px;width:40px;height:40px;border-radius:12px;cursor:pointer;flex:0 0 auto;display:none;align-items:center;justify-content:center;}
.brand{display:flex;flex-direction:column;gap:2px;min-width:0;}
.brand .logo{font-weight:900;font-size:17px;}.brand .logo b{color:var(--gold-soft);}
.brand .sub{font-size:12px;color:#b9c6dd;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.who{margin-left:auto;font-size:12px;color:#cdd8ea;font-weight:600;}
.section-title{margin:24px 4px 14px;font-size:15px;font-weight:700;color:var(--muted);display:flex;align-items:center;gap:8px;}
.section-title::before{content:"";width:4px;height:16px;background:var(--gold);border-radius:2px;}
.login{max-width:420px;margin:48px auto 0;background:var(--paper);border:1px solid var(--line);border-radius:22px;padding:30px 26px;text-align:center;}
.login .ltitle{font-size:22px;font-weight:900;}.login .ltitle b{color:var(--gold);}
.login .lsub{font-size:13px;color:var(--muted);margin:8px 0 22px;}
.field{text-align:left;margin-bottom:14px;}
.field label{display:block;font-size:13px;font-weight:700;color:var(--navy2);margin-bottom:6px;}
.tin{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;font-size:16px;font-family:inherit;outline:none;}
.tin:focus{border-color:var(--navy3);}
.bigbtn{width:100%;background:var(--navy);color:#fff;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;}
.bigbtn:active{transform:scale(.98);}
.note{font-size:11.5px;color:var(--muted);margin-top:14px;line-height:1.5;}
.chips{display:flex;flex-wrap:wrap;gap:10px;}
.ychip{background:var(--paper);border:1.5px solid var(--line);border-radius:14px;padding:14px 22px;font-size:17px;font-weight:800;cursor:pointer;color:var(--navy);}
.ychip.sel{background:var(--navy);color:#fff;border-color:var(--navy);}
.ychip.dim{opacity:.4;}
.numgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(82px,1fr));gap:10px;}
.numcell{background:var(--paper);border:2px solid var(--line);border-radius:14px;padding:16px 6px;text-align:center;cursor:pointer;font-weight:800;font-size:18px;color:var(--navy);font-family:'Jua';position:relative;}
.numcell.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.numcell.on::after{content:"✓";position:absolute;top:4px;right:7px;font-size:11px;color:var(--gold-soft);font-family:'Noto Sans KR';}
.toolrow{display:flex;gap:8px;margin:0 4px 14px;}
.tbtn{background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 14px;font-size:12.5px;font-weight:700;color:var(--navy2);cursor:pointer;}
.barbtm{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);padding:12px 16px;z-index:40;box-shadow:0 -3px 16px rgba(0,0,0,.06);}
.barbtm .inner{max-width:760px;margin:0 auto;display:flex;align-items:center;gap:12px;}
.barbtm .left{font-size:13px;font-weight:700;color:var(--muted);}
.barbtm .act{margin-left:auto;background:var(--navy);color:#fff;border:none;border-radius:12px;padding:13px 26px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;}
.barbtm .act.gold{background:var(--gold);color:#3a2c08;}
.barbtm .act:disabled{opacity:.4;}
.intro{color:var(--muted);font-size:13px;line-height:1.6;margin:14px 4px 0;}
.grid.stages{display:grid;gap:12px;grid-template-columns:1fr;}
.scard{display:flex;align-items:center;gap:14px;padding:16px;}
.scard .sicon{flex:0 0 auto;width:46px;height:46px;border-radius:13px;background:var(--navy);color:#fff;font-family:'Jua';font-weight:900;font-size:19px;display:flex;align-items:center;justify-content:center;}
.scard .sbody{flex:1;min-width:0;}
.scard .sname{font-size:16px;font-weight:800;}
.scard .sdesc{font-size:12.5px;color:var(--muted);margin-top:3px;}
.scard .schk{width:26px;height:26px;border-radius:50%;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px;}
.scard.on{border-color:var(--navy);background:#f4f7fc;}
.scard.on .schk{background:var(--ok);border-color:var(--ok);}
/* 문제 헤더/타이머 */
.qtop{display:flex;align-items:center;gap:10px;margin:18px 0 6px;}
.qtop .stg{font-size:13px;font-weight:800;color:var(--navy);}
.qtop .pos{margin-left:auto;font-size:12px;font-weight:700;color:var(--muted);}
.tbarwrap{height:8px;background:var(--line);border-radius:99px;overflow:hidden;margin:6px 0 2px;}
.tbarwrap>i{display:block;height:100%;background:linear-gradient(90deg,var(--ok),var(--gold));transition:width .25s linear;}
.tbarwrap.warn>i{background:linear-gradient(90deg,#e0a93b,var(--no));}
.tnum{font-size:12px;font-weight:800;color:var(--muted);text-align:right;}
.tnum.warn{color:var(--no);}
.numtag{font-family:'Jua';font-weight:900;color:var(--navy3);font-size:14px;}
.qcard{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:20px 18px;margin-top:8px;}
.qko{font-size:16px;line-height:1.6;color:#2a3548;font-weight:500;margin-bottom:14px;}
.sentence{font-size:18px;line-height:2.2;}
.fx{color:#34405a;}
.blk{display:inline-block;min-width:70px;border-bottom:2.5px solid var(--gold);color:var(--gold);font-weight:800;text-align:center;padding:0 6px;}
.blk.in{border:none;}
.blkbtn{display:inline-block;min-width:84px;border-bottom:2.5px solid var(--gold);color:var(--gold);font-weight:800;text-align:center;padding:2px 10px;cursor:pointer;border-radius:6px 6px 0 0;}
.blkbtn.on{background:#fbf3df;}
.blkbtn.filled{color:var(--navy);}
.blkfill{display:inline-block;padding:0 6px;font-weight:800;}
.blkfill.okf{color:var(--ok);border-bottom:2.5px solid var(--ok);}
.blkfill.nof{color:var(--no);border-bottom:2.5px solid var(--no);}
.optpop{display:none;margin-top:14px;border:1px solid var(--line);border-radius:14px;padding:10px;background:#fbfcfe;}
.optpop.show{display:block;}
.poptitle{font-size:12px;font-weight:800;color:var(--navy3);margin:2px 4px 10px;}
.optv{display:block;width:100%;text-align:left;background:#fff;border:1.5px solid var(--navy3);border-radius:11px;padding:13px 15px;margin-bottom:9px;font-size:15px;font-weight:600;color:var(--navy);cursor:pointer;}
.optv:last-child{margin-bottom:0;}
.optv:active{background:var(--navy);color:#fff;}
.optv b{color:var(--gold);margin-right:8px;}
.binp{border:none;border-bottom:2.5px solid var(--navy3);font-size:17px;font-family:inherit;width:120px;text-align:center;outline:none;background:transparent;color:var(--navy);font-weight:600;}
.bnumlbl{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:var(--gold);color:#3a2c08;font-size:10px;font-weight:800;vertical-align:super;margin-left:1px;}
.optgrouptitle{font-size:12px;font-weight:800;color:var(--navy3);margin:16px 0 8px;}
.optgrp{display:flex;flex-wrap:wrap;gap:9px;}
.opt{flex:1 1 calc(50% - 9px);min-width:120px;background:#fff;border:1.5px solid var(--navy3);color:var(--navy);border-radius:12px;padding:13px 12px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;}
.opt.sel{background:var(--navy);color:#fff;}
.opt.right{background:var(--ok)!important;color:#fff;border-color:var(--ok);}
.opt.wrong{background:var(--no)!important;color:#fff;border-color:var(--no);}
.ta{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;font-size:17px;font-family:inherit;line-height:1.6;resize:vertical;min-height:70px;outline:none;}
.ta:focus{border-color:var(--navy3);}.ta.right{border-color:var(--ok);background:var(--ok-bg);}.ta.wrong{border-color:var(--no);background:var(--no-bg);}
.markrow{margin-top:14px;font-size:15px;font-weight:800;}
.markrow.ok{color:var(--ok);}.markrow.no{color:var(--no);}
.ansmini{margin-top:8px;font-size:15px;color:#15512f;background:var(--ok-bg);border:1px solid #bfe3cd;border-radius:10px;padding:10px 13px;line-height:1.6;}
.gradebanner{border-radius:16px;padding:22px;margin:18px 0;text-align:center;color:#fff;}
.gradebanner.pass{background:linear-gradient(135deg,var(--ok),#16683f);}
.gradebanner.fail{background:linear-gradient(135deg,var(--no),#8c2f1d);}
.gradebanner .score{font-size:36px;font-weight:900;font-family:'Jua';}
.gradebanner .msg{font-size:14px;margin-top:6px;opacity:.95;}
.resultcard{background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:24px;margin-top:22px;}
.resultcard h2{margin:0 0 4px;font-size:20px;font-family:'Jua';}
.rmeta{font-size:13px;color:var(--muted);margin-bottom:16px;}
.rrow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line);font-size:15px;}
.rrow .rname{font-weight:700;flex:1;}.rrow .rscore{font-weight:800;}
.badge{font-size:12px;font-weight:800;padding:3px 9px;border-radius:8px;}
.badge.p{background:var(--ok-bg);color:var(--ok);}.badge.f{background:var(--no-bg);color:var(--no);}.badge.s{background:#eef1f6;color:var(--muted);}
.rfinal{margin-top:16px;font-size:17px;font-weight:900;text-align:center;}
.copybox{margin-top:18px;}
.copybox textarea{width:100%;min-height:160px;border:1.5px solid var(--line);border-radius:12px;padding:12px;font-family:inherit;font-size:13px;line-height:1.6;color:#33405a;background:#f8fafc;resize:vertical;}
.copyrow{display:flex;gap:10px;margin-top:10px;}
.copybtn{flex:1;background:#fae100;color:#3a1d1d;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;}
.homebtn{background:#eef1f6;color:var(--navy);border:none;border-radius:12px;padding:14px 20px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;}
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:var(--navy);color:#fff;padding:11px 20px;border-radius:99px;font-size:13px;font-weight:700;z-index:99;opacity:0;transition:opacity .25s;pointer-events:none;}
.toast.show{opacity:1;}
.fade{animation:fade .2s ease;}@keyframes fade{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
.arrwrap{font-size:16px;line-height:2;}
.arrfix{color:#34405a;font-weight:600;}
.arrseg{display:block;margin:10px 0;padding:10px 12px;border:1px dashed var(--line);border-radius:12px;background:#fbfcfe;}
.arrlbl{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:var(--gold);color:#3a2c08;font-size:11px;font-weight:800;margin-right:8px;vertical-align:middle;}
.arrslots{display:flex;flex-wrap:wrap;gap:7px;min-height:42px;align-items:center;padding:6px;border-radius:10px;background:#fff;border:1.5px solid var(--line);}
.arrslots.okc{border-color:var(--ok);background:var(--ok-bg);}
.arrslots.noc{border-color:var(--no);background:var(--no-bg);}
.slotchip{background:var(--navy);color:#fff;border:none;border-radius:9px;padding:9px 12px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;}
.slotchip.done{cursor:default;}
.slotempty{color:var(--muted);font-size:13px;padding:6px;}
.arrpool{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.poolchip{background:#fff;border:1.5px solid var(--navy3);color:var(--navy);border-radius:10px;padding:10px 13px;font-size:14.5px;font-weight:700;font-family:inherit;cursor:pointer;}
.poolchip:active{background:var(--navy);color:#fff;}
.arrans{margin-top:8px;font-size:14px;color:#15512f;background:var(--ok-bg);border:1px solid #bfe3cd;border-radius:9px;padding:8px 11px;line-height:1.6;}
/* ===== 태블릿 크게 보기 + 추가 요소 ===== */
body{font-size:17px;}
.login{max-width:460px;}
.login .ltitle{font-size:27px;}
.login .lsub{font-size:15px;}
.qcard{padding:24px 20px;}
.qko{font-size:19px;line-height:1.7;margin-bottom:16px;}
.sentence{font-size:21px;line-height:2.4;}
.optv{font-size:18px;padding:16px 18px;border-radius:13px;}
.binp{font-size:20px;width:140px;}
.blkbtn{font-size:19px;min-width:96px;padding:3px 12px;}
.blkfill{font-size:19px;}
.scard .sicon{width:52px;height:52px;font-size:21px;}
.scard .sname{font-size:18px;}
.scard .sdesc{font-size:14px;}
.barbtm .act{font-size:17px;padding:15px 30px;}
.tnum{font-size:14px;}
.arrwrap{font-size:18px;line-height:2.1;}
.arrfix{font-size:18px;}
.slotchip{font-size:16px;padding:11px 14px;}
.poolchip{font-size:16px;padding:12px 15px;}
.slotchip.lock{background:#e7ddc2;color:#6b5a2a;cursor:default;}
.markrow{font-size:17px;}
.ansmini{font-size:16px;}
.gradebanner .score{font-size:44px;}
.gradebanner .msg{font-size:15px;}
.numcell{font-size:20px;padding:18px 6px;}
.ychip{font-size:19px;padding:16px 24px;}
.choicewrap{max-width:480px;margin:30px auto 0;}
.choicemsg{font-size:16px;line-height:1.75;color:#33405a;background:#fbfcfe;border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin:18px 0;}
.bigbtn.alt{background:#fff;color:var(--navy);border:2px solid var(--navy3);}
.bigbtn{font-size:18px;padding:17px;}
/* ===== 배열 한 줄형 + 첫글자 힌트 + 종료 선택 ===== */
.arrline{font-size:20px;line-height:2.5;margin:6px 0 4px;}
.arrline .slot{display:inline-block;min-width:48px;border-bottom:2.5px solid var(--gold);margin:0 2px;}
.arrline .slotchip{margin:3px 3px;vertical-align:middle;}
.arrline .arrfix{color:#34405a;font-weight:600;}
.slotchip.okc{background:var(--ok);}
.slotchip.noc{background:var(--no);}
.bhint{font-weight:900;color:var(--navy);font-size:21px;margin-right:1px;}
.binp.rest{width:118px;}
.endwrap{max-width:480px;margin:24px auto 0;}
.bigbtn.ghost{background:#eef1f6;color:var(--navy);border:none;}
/* ===== 귀여운 폰트 + 마무리 다듬기 ===== */
:root{--bg:#eef2f8;}
body{background:radial-gradient(1200px 600px at 50% -10%, #f3f7ff 0%, var(--bg) 60%);}
.sentence,.arrline,.arrfix,.arrgiven,.slotchip,.poolchip,.optv,.binp,.blkfill,.blkbtn,.bhint{font-family:'Quicksand','Jua',sans-serif;}
.sentence,.arrline{font-weight:600;}
.arrgiven{color:#34405a;font-weight:600;}
.qcard{box-shadow:0 6px 22px rgba(19,35,63,.06);border-radius:22px;}
.scard{border-radius:20px;}
.optv{box-shadow:0 2px 8px rgba(19,35,63,.05);}
.poolchip{box-shadow:0 3px 10px rgba(19,35,63,.07);transition:transform .08s;}
.poolchip:active{transform:translateY(1px) scale(.97);}
.slotchip{box-shadow:0 3px 9px rgba(19,35,63,.18);}
.bigbtn{border-radius:18px;box-shadow:0 6px 16px rgba(19,35,63,.14);}
.act{border-radius:16px!important;}
.gradebanner{border-radius:22px;box-shadow:0 10px 26px rgba(19,35,63,.12);}
.gradebanner .score{letter-spacing:.5px;}
header{box-shadow:0 3px 18px rgba(19,35,63,.22);}
.numcell,.ychip{transition:transform .08s;}
.numcell:active,.ychip:active{transform:scale(.96);}
/* ===== 함초롱바탕 (없으면 바탕 계열로 대체) ===== */
:root{--hcr:'Gowun Dodum','Noto Sans KR',sans-serif;}
html,body{font-family:var(--hcr);}
.sentence,.arrline,.arrfix,.arrgiven,.slotchip,.poolchip,.optv,.binp,.blkfill,.blkbtn,.bhint,
.qko,.q013,.note,.intro,.section-title,
.ltitle,.lsub,.brand .logo,.brand .sub,.who,
.gradebanner .score,.gradebanner .msg,.resultcard h2,.rmeta,.rname,.rscore,.badge,.rfinal,
.numtag,.numcell,.ychip,.bigbtn,.act,.tin,.scard .sname,.scard .sdesc,.scard .sicon,
.poptitle,.markrow,.ansmini,.arrans,.choicemsg{font-family:var(--hcr);}
/* 바탕체는 약간 두툼하게 보이도록 가독성 보정 */
.sentence,.arrline{font-weight:500;}
.arrgiven{font-weight:500;color:#34405a;}
.sdone{margin-top:6px;font-size:12.5px;font-weight:700;color:var(--ok);}
.scard.fin{border-color:var(--ok);}
.gradesel{display:flex;gap:14px;margin:12px 0;}
.gradebtn{flex:1;padding:38px 0;font-size:26px;font-weight:800;border:2px solid var(--navy3);border-radius:22px;background:#fff;color:var(--navy);cursor:pointer;font-family:var(--hcr);box-shadow:0 5px 16px rgba(19,35,63,.08);transition:transform .08s;}
.gradebtn:active{transform:scale(.97);background:var(--navy);color:#fff;}
.tday{font-weight:800;color:var(--navy);margin:18px 0 8px;font-size:16px;}
.trow{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 4px 14px rgba(19,35,63,.05);}
.thead{display:flex;align-items:center;gap:8px;}
.thead b{font-size:17px;}
.tg{font-size:12px;background:var(--navy);color:#fff;border-radius:8px;padding:2px 9px;}
.copybtn{margin-left:auto;font-size:13px;background:#fee500;color:#3a2c00;border:none;border-radius:10px;padding:9px 13px;font-weight:800;cursor:pointer;font-family:var(--hcr);}
.tsub{font-size:13px;color:var(--muted);margin:6px 0;}
.tsum{font-size:14px;color:#33405a;line-height:1.7;background:#fbfcfe;border:1px solid var(--line);border-radius:10px;padding:10px 12px;}
/* 선생님 화면 작게 */
.tday{font-size:12px;margin:12px 0 5px;}
.trow{padding:8px 10px;margin-bottom:6px;border-radius:9px;box-shadow:none;}
.thead{gap:6px;}
.thead b{font-size:12.5px;}
.tg{font-size:9.5px;padding:1px 6px;border-radius:6px;}
.copybtn{font-size:10.5px;padding:4px 8px;border-radius:7px;}
.tsub{font-size:10.5px;margin:3px 0;}
.tsum{font-size:11px;line-height:1.45;padding:6px 8px;border-radius:7px;}
</style>
</head>
<body>
<header><div class="hwrap">
  <button class="back" id="backBtn">‹</button>
  <div class="brand"><div class="logo">헤일리 <b>고등학교</b> 모의고사</div><div class="sub" id="hsub">예상 모의고사 학습</div></div>
  <div class="who" id="who"></div>
</div></header>
<div class="wrap" id="app"></div>

  if(!id||!pw||!name){toast('아이디·비밀번호·이름을 모두 입력하세요');return;}

function selNone(){sel.clear();render();}

/* ===== 엔진: 모든 단계 페이지형(2~3문장/페이지) ===== */
const PAGE_SIZE=2;   // 한 페이지 문장 수 (태블릿 권장 2, 짧은 지문은 3까지)
const WEAK=new Set('most more much many few less least very quite just even also only then than now still well good great big small long high low same other another such each every some any all both one two three first last next time times way ways thing things fact facts day days year years part parts kind sort lot lots into onto upon over under about'.split(' '));

function startSession(){
  const ex=EXAMS.find(e=>e.id===S.examId),chosen=examPassages(ex).filter(p=>sel.has(p.id));
  const order=shuffle(chosen);
  const raw=[];
  order.forEach(p=>p.sentences.forEach((sent,si)=>raw.push({pid:p.id,ptitle:p.title,si,ko:sent.ko,segs:sent.segs,toks:tokenize(sent),correct:correctText(sent)})));
  const pool=[...new Set(raw.flatMap(it=>it.toks.filter(isCand).map(t=>t.core)))];
  const BLANK_GAP=3;
  raw.forEach(it=>{
    // 빈칸 후보: 조각(chip) 단어 중 핵심어만 (길이>=4, 흔한 말 제외)
    const cands=it.toks.map((t,ti)=>({ti,core:t.core}))
      .filter(x=>{const t=it.toks[x.ti];const c=t.core.toLowerCase();return t.chip && /[a-zA-Z]/.test(t.core) && t.core.replace(/[^a-z]/gi,'').length>=4 && !STOP.has(c) && !WEAK.has(c);});
    const seen=new Set(),uniq=[];
    cands.sort((a,b)=>b.core.length-a.core.length).forEach(c=>{const k=c.core.toLowerCase();if(!seen.has(k)){seen.add(k);uniq.push(c);}});
    let chosenB=[];
    if(uniq.length){ const first=uniq[0]; chosenB=[first];
      const second=uniq.find(c=>c!==first && Math.abs(c.ti-first.ti)>=BLANK_GAP); if(second)chosenB.push(second); }
    chosenB=chosenB.sort((a,b)=>a.ti-b.ti);
    it.blanks=chosenB.map(c=>{
      const ans=c.core;
      let pd=shuffle(pool.filter(w=>norm(w)!==norm(ans)));
      const near=pd.filter(w=>Math.abs(w.length-ans.length)<=3); pd=[...near,...pd];
      const ds=[]; for(const w of pd){if(ds.length>=3)break;if(!ds.some(x=>norm(x)===norm(w)))ds.push(w);}
      return {ti:c.ti,answer:ans,opts:shuffle([ans,...ds])};
    });
    // 문장 배열용: 한 문장 = 하나의 배열 (조각 전체를 한 풀로, 고정부는 그대로)
    it.seq=buildUnits({segs:it.segs});        // [{chip,text}, ...] 정답 순서
    it.mv=it.seq.filter(u=>u.chip).map(u=>u.text);   // 움직이는 조각(정답 순서)
  });
  S.items=raw; S.orderTitles=order.map(p=>p.title);
  S.ans={1:{},2:{},3:{},4:{}}; S.stats={}; S.stoppedStage=null;
  S.sid=(S.id||S.student||'u')+'-'+S.examId+'-'+Date.now();
  S.sel=new Set([1,2,3,4]);
  setScreen('stageselect');
}

function renderStageSelect(){
  backBtn.style.display='flex';hsub.textContent=`${S.examTitle} · 단계 선택`;
  const names={1:'1단계 · 빈칸 객관식',2:'2단계 · 문장 배열',3:'3단계 · 재시험(배열)',4:'4단계 · 빈칸 주관식'};
  const desc={1:'핵심 단어 빈칸을 보기에서 고르기',2:'조각을 눌러 배열 (빈칸 최대 4개)',3:'틀린 문장 다시 배열 (빈칸 4~5개)',4:'핵심 단어 첫 글자 보고 쓰기'};
  let h=`<div class="section-title">진행할 단계 선택 (여러 개 가능)</div><div class="grid stages">`;
  [1,2,3,4].forEach(s=>{const on=S.sel.has(s);const st=S.stats[s];
    const done=st?`<div class="sdone">✓ 완료 · ${s<=2?st.score+'점':st.c+'/'+st.t}</div>`:'';
    h+=`<div class="card scard ${on?'on':''} ${st?'fin':''}" onclick="toggleStage(${s})"><div class="sicon">${s}</div>
      <div class="sbody"><div class="sname">${names[s]}</div><div class="sdesc">${desc[s]}</div>${done}</div>
      <div class="schk">${on?'✓':''}</div></div>`;});
  h+=`</div><div class="intro">각 단계가 끝나면 <b>단계 선택으로 다시 돌아올 수 있어요.</b> 이미 끝낸 단계는 ‘✓ 완료’로 표시되고 점수는 기록돼요. 3·4단계는 앞 단계에서 틀린 문장으로 재시험하되, 따로 선택하면 전체로도 풀 수 있어요.</div>
    <div class="barbtm"><div class="inner"><span class="left">${S.sel.size}단계 선택</span>
    <button class="act gold" ${S.sel.size?'':'disabled'} onclick="startPlan()">시작하기 →</button></div></div>`;
  app.className='fade';app.innerHTML=h;
}
function toggleStage(s){S.sel.has(s)?S.sel.delete(s):S.sel.add(s);render();}
function planMore(){return S.planPos<S.plan.length-1;}
function startPlan(){S.plan=[1,2,3,4].filter(s=>S.sel.has(s));S.planPos=-1;advancePlan();}
function advancePlan(){S.planPos++;while(S.planPos<S.plan.length){if(stageItems(S.plan[S.planPos]).length>0){startStage(S.plan[S.planPos]);return;}S.planPos++;}setScreen('result');}

function passMark(st){ return st===3?90:80; }   // 1·2단계 80%, 3단계 90% (지문별)
function passageScore(st){ const m={}; const ans=S.ans[st]||{};
  Object.keys(ans).forEach(i=>{ const it=S.items[i]; if(!it)return; const a=ans[i]; (m[it.pid]=m[it.pid]||{c:0,t:0}); m[it.pid].t++; if(a&&a.result)m[it.pid].c++; });
  return m; }
function failedPids(st,mark){ const m=passageScore(st); return Object.keys(m).filter(p=>m[p].t>0 && (m[p].c/m[p].t*100) < mark); }
function failUnion12(){ const set=new Set(); if(S.stats&&S.stats[1])failedPids(1,80).forEach(p=>set.add(p)); if(S.stats&&S.stats[2])failedPids(2,80).forEach(p=>set.add(p)); return [...set]; }
function pidTitle(pid){ const it=S.items.find(x=>x.pid===pid); return it?it.ptitle:pid; }
function failTitles(pids){ return pids.map(pidTitle).join(', '); }
function stageItems(st){
  const hasBlank=i=>S.items[i].blanks.length>0;
  const allIdx=S.items.map((_,i)=>i);
  if(st===1)return allIdx.filter(hasBlank);
  if(st===2)return allIdx;
  if(st===3){ if(!(S.stats[1]||S.stats[2]))return allIdx; const f=failUnion12(); return f.length?allIdx.filter(i=>f.includes(S.items[i].pid)):[]; }
  // 4단계: 3단계 90% 미달 지문 → 없으면 1·2단계 미달 지문 → 둘 다 없고 단독선택이면 전체
  let pids = S.stats[3] ? failedPids(3,90) : failUnion12();
  let base;
  if(pids&&pids.length) base=allIdx.filter(i=>pids.includes(S.items[i].pid));
  else if(!(S.stats[1]||S.stats[2]||S.stats[3])) base=allIdx;
  else base=[];
  return base.filter(hasBlank);
}
function startStage(st){
  S.stage=st; S.ans[st]={};
  const items=stageItems(st);
  const ps=(st===2||st===3)?1:PAGE_SIZE;
  S.screens=[]; for(let i=0;i<items.length;i+=ps)S.screens.push(items.slice(i,i+ps));
  S.spos=0; S.phase='answering';
  if(st===2||st===3){ const cap=(st===2)?4:5; items.forEach(idx=>{ const it=S.items[idx];
      const n=Math.min(it.mv.length,cap);
      const bset=shuffle(it.mv.map((_,i)=>i)).slice(0,n).sort((a,b)=>a-b);
      S.ans[st][idx]={bset,pool:shuffle(bset.slice()),seq:[]}; }); }
  setScreen('stage');
}
function screenTime(){return S.screens[S.spos].reduce((t,idx)=>t+qTime(S.stage,S.items[idx]),0);}

function renderStage(){
  backBtn.style.display='none';
  if(S.phase==='stageend'){hsub.textContent=STAGE_NAME[S.stage]+' 결과';app.className='fade';app.innerHTML=stageEndHTML();return;}
  hsub.textContent=STAGE_NAME[S.stage];app.className='';app.innerHTML=screenHTML();
  if(S.phase==='answering'){S.qfull=screenTime();S.timeLeft=S.qfull;startTimer();}
}

function screenHTML(){
  const st=S.stage,graded=(S.phase==='qgraded'),ids=S.screens[S.spos];
  let h=`<div class="qtop"><span class="stg">${STAGE_NAME[st]}</span><span class="pos">${S.spos+1} / ${S.screens.length}</span></div>
    <div class="tbarwrap" id="tbar"><i style="width:100%"></i></div><div class="tnum" id="tnum">${screenTime()}초</div>`;
  ids.forEach(idx=>{ h+=itemCardHTML(st,idx,graded); });
  if(graded){
    const last=S.spos>=S.screens.length-1;
    h+=`<div class="barbtm"><div class="inner"><span class="left">${S.spos+1}/${S.screens.length}</span>
      <button class="act" onclick="nextScreen()">${last?'단계 채점 보기 →':'다음 →'}</button></div></div>`;
  }else{
    const hint=(st===2||st===3)?'조각을 순서대로 배열하세요':'정답을 고르고/쓰고 확인';
    h+=`<div class="barbtm"><div class="inner"><span class="left">${hint}</span>
      <button class="act" onclick="submitScreen()">확인</button></div></div>`;
  }
  return h;
}
function itemCardHTML(st,idx,graded){
  const it=S.items[idx],a=S.ans[st][idx]||{};
  let h=`<div class="qcard"><div class="qko"><span class="numtag">${it.ptitle.replace('번','')}-${(it.si||0)+1}.</span> ${escapeHtml(it.ko)}</div>`;
  if(st===1){
    h+=`<div class="sentence">${sentWithBlanks(it,idx,graded?a:null,'mc')}</div>`;
    if(!graded) it.blanks.forEach((b,bi)=>{
      h+=`<div class="optpop" id="pop-${idx}-${bi}"><div class="poptitle">${it.ptitle.replace('번','')}-${(it.si||0)+1}번 · 빈칸 ${it.blanks.length>1?(bi+1)+' ':''}보기</div>`;
      b.opts.forEach((o,oi)=>{ h+=`<button class="optv" onclick="pickOptV(${idx},${bi},${oi})"><b>${oi+1}.</b>${escapeHtml(o)}</button>`; });
      h+=`</div>`; });
  }else if(st===2||st===3){
    h+=arrangeHTML(it,st,idx,graded,a);
  }else{
    h+=`<div class="sentence">${sentWithBlanks(it,idx,graded?a:null,'sub')}</div>`;
  }
  if(graded){
    const ok=a.result;
    h+=`<div class="markrow ${ok?'ok':'no'}">${ok?'✓ 정답':(a.timeout?'⏱ 시간초과 · 오답':'✗ 오답')}</div>`;
    if(!ok){
      if(st===2||st===3) h+=`<div class="ansmini"><b>정답</b> ${escapeHtml(it.correct)}</div>`;
      else {
        const wrongAns=it.blanks.filter((b,bi)=>{
          if(st===1){const sl=a.sel?a.sel[bi]:null;return sl==null||norm(b.opts[sl])!==norm(b.answer);}
          const full=b.answer[0]+((a.subv&&a.subv[bi]!=null)?a.subv[bi]:'');return norm(full)!==norm(b.answer);
        }).map(b=>escapeHtml(b.answer));
        if(wrongAns.length) h+=`<div class="ansmini"><b>정답</b> ${wrongAns.join(' , ')}</div>`;
      }
    }
  }
  h+=`</div>`;
  return h;
}
function sentWithBlanks(it,idx,a,mode){
  const CAP=s=>s.replace(/[a-zA-Z]/,c=>c.toUpperCase());
  const bmap={}; it.blanks.forEach((b,bi)=>bmap[b.ti]=bi);
  const parts=it.toks.map((t,ti)=>{
    const first=(ti===0);
    if(ti in bmap){const bi=bmap[ti];const ob=it.blanks[bi];let inner;
      if(mode==='mc'){
        if(!a){ inner=`<span class="blkbtn" id="blk-${idx}-${bi}" onclick="openOpts(${idx},${bi})">______</span>`; }
        else{ const sl=a.sel?a.sel[bi]:null; let txt=(sl!=null)?ob.opts[sl]:'(미선택)'; if(first)txt=CAP(txt); const ok=(sl!=null)&&norm(ob.opts[sl])===norm(ob.answer);
          inner=`<span class="blkfill ${ok?'okf':'nof'}">${escapeHtml(txt)}</span>`; }
      }else{ // sub: 첫 글자 제시 + 나머지 입력
        if(!a){ const dashes=ob.answer.length>1?Array(ob.answer.length-1).fill('_').join(' '):''; const hint=first?CAP(ob.answer[0]):ob.answer[0];
          inner=`<span class="bhint">${escapeHtml(hint)}</span><input class="binp rest" id="bin-${idx}-${bi}" placeholder="${dashes}">`; }
        else{ const rest=(a.subv&&a.subv[bi]!=null)?a.subv[bi]:''; let full=ob.answer[0]+rest; if(first)full=CAP(full); const ok=norm(ob.answer[0]+rest)===norm(ob.answer);
          inner=`<span class="blkfill ${ok?'okf':'nof'}">${escapeHtml(full||ob.answer[0])}</span>`; }
      }
      const lbl=it.blanks.length>1?`<span class="bnumlbl">${bi+1}</span>`:'';
      return t.pre+inner+lbl+t.post;
    }
    let txt=t.pre+t.core+t.post; if(first)txt=CAP(txt); return escapeHtml(txt);
  });
  return parts.join(' ').replace(/\s+([,.;:?!])/g,'$1').replace(/\s+/g,' ').trim();
}
function openOpts(idx,bi){
  const cur=document.getElementById('pop-'+idx+'-'+bi);
  const wasOpen=cur&&cur.classList.contains('show');
  S.items[idx].blanks.forEach((b,k)=>{const p=document.getElementById('pop-'+idx+'-'+k);if(p)p.classList.remove('show');const blk=document.getElementById('blk-'+idx+'-'+k);if(blk)blk.classList.remove('on');});
  if(!wasOpen&&cur){cur.classList.add('show');const blk=document.getElementById('blk-'+idx+'-'+bi);if(blk)blk.classList.add('on');setTimeout(()=>{try{cur.scrollIntoView({behavior:'smooth',block:'center'});}catch(e){cur.scrollIntoView();}},40);}
}
function pickOptV(idx,bi,oi){S.ans[1][idx]=S.ans[1][idx]||{sel:[]};S.ans[1][idx].sel=S.ans[1][idx].sel||[];S.ans[1][idx].sel[bi]=oi;
  const blk=document.getElementById('blk-'+idx+'-'+bi);if(blk){blk.textContent=S.items[idx].blanks[bi].opts[oi];blk.classList.add('filled');blk.classList.remove('on');}
  const p=document.getElementById('pop-'+idx+'-'+bi);if(p)p.classList.remove('show');}
function readSub(idx){const o=S.ans[4][idx]=S.ans[4][idx]||{};o.subv=[];S.items[idx].blanks.forEach((b,bi)=>{const el=document.getElementById('bin-'+idx+'-'+bi);o.subv[bi]=el?el.value:'';});}

function arrangeHTML(it,st,idx,graded,a){return `<div id="arrbox-${idx}">`+arrangeInner(it,st,idx,graded,a)+`</div>`;}
function arrangeInner(it,st,idx,graded,a){
  const bset=(a&&a.bset)?a.bset:[], seq=(a&&a.seq)?a.seq:[], pool=(a&&a.pool)?a.pool:[];
  let h=`<div class="arrwrap"><div class="arrline">`;
  let c=0;
  it.seq.forEach(u=>{
    if(!u.chip){ h+=`<span class="arrfix">${escapeHtml(u.text)}</span> `; return; }
    const cc=c++; const m=bset.indexOf(cc);
    if(m<0){ h+=`<span class="arrgiven">${escapeHtml(it.mv[cc])}</span> `; return; }  // 주어진 조각
    if(graded){
      if(m<seq.length){ const txt=it.mv[seq[m]]; const ok=norm(txt)===norm(it.mv[cc]);
        h+=`<span class="slotchip ${ok?'okc':'noc'} done">${escapeHtml(txt)}</span> `; }
      else h+=`<span class="slot">____</span> `;
    }else{
      if(m<seq.length){ const txt=it.mv[seq[m]];
        h+=`<button class="slotchip" onclick="removeChip(${idx},${m})">${escapeHtml(txt)}</button> `; }
      else h+=`<span class="slot">____</span> `;
    }
  });
  h+=`</div>`;
  if(graded){
    const ok=seq.length===bset.length&&bset.every((cidx,m)=>norm(it.mv[seq[m]])===norm(it.mv[cidx]));
    if(!ok) h+=`<div class="arrans">정답: ${escapeHtml(it.correct)}</div>`;
  }else{
    h+=`<div class="arrpool">`;
    pool.forEach(pi=>{ if(seq.indexOf(pi)<0) h+=`<button class="poolchip" onclick="placeChip(${idx},${pi})">${escapeHtml(it.mv[pi])}</button>`; });
    h+=`</div>`;
  }
  return h+`</div>`;
}
function placeChip(idx,pi){const a=S.ans[S.stage][idx]=S.ans[S.stage][idx]||{};a.seq=a.seq||[];const bn=a.bset?a.bset.length:0;if(a.seq.indexOf(pi)<0&&a.seq.length<bn)a.seq.push(pi);refreshArrange(idx);}
function removeChip(idx,m){const a=S.ans[S.stage][idx];if(a&&a.seq)a.seq.splice(m,1);refreshArrange(idx);}
function refreshArrange(idx){const box=document.getElementById('arrbox-'+idx);if(!box)return;const st=S.stage,it=S.items[idx],a=S.ans[st][idx]||{};box.innerHTML=arrangeInner(it,st,idx,false,a);}

function startTimer(){
  const tnum=document.getElementById('tnum'),tbar=document.getElementById('tbar');
  const full=S.qfull||screenTime();
  const tick=()=>{
    if(tnum)tnum.textContent=S.timeLeft+'초';
    if(tbar){tbar.firstElementChild.style.width=(S.timeLeft/full*100)+'%';tbar.classList.toggle('warn',S.timeLeft<=Math.ceil(full*0.34));}
    if(tnum)tnum.classList.toggle('warn',S.timeLeft<=Math.ceil(full*0.34));
    if(S.timeLeft<=0){clearInterval(timerId);submitScreen(true);return;}
    S.timeLeft--;
  };
  tick(); timerId=setInterval(tick,1000);
}
function submitScreen(timeout){
  clearInterval(timerId);
  const st=S.stage,ids=S.screens[S.spos];
  ids.forEach(idx=>{
    const it=S.items[idx]; let a=S.ans[st][idx]=S.ans[st][idx]||{}; a.timeout=!!timeout;
    if(st===1){a.sel=a.sel||[];a.result=it.blanks.length>0&&it.blanks.every((b,bi)=>a.sel[bi]!=null&&norm(b.opts[a.sel[bi]])===norm(b.answer));}
    else if(st===4){readSub(idx);a.subv=S.ans[4][idx].subv||[];a.result=it.blanks.length>0&&it.blanks.every((b,bi)=>norm(b.answer[0]+(a.subv[bi]||''))===norm(b.answer));}
    else{a.seq=a.seq||[];a.bset=a.bset||[];a.result=a.seq.length===a.bset.length&&a.bset.every((cidx,m)=>norm(it.mv[a.seq[m]])===norm(it.mv[cidx]));}
  });
  S.phase='qgraded';render();
}
function nextScreen(){ if(S.spos>=S.screens.length-1){endStage();return;} S.spos++;S.phase='answering';render(); }
function endStage(){
  const st=S.stage,ids=stageItems(st);let c=0;
  ids.forEach(i=>{if(S.ans[st][i]&&S.ans[st][i].result)c++;});
  const t=ids.length,score=t?Math.round(c/t*100):100;
  S.stats[st]={c,t,score}; sendResult(); S.phase='stageend';render();
}
function navBtns(){ return `<button class="bigbtn ghost" style="margin-bottom:12px" onclick="goStageSelect()">단계 선택으로</button><button class="bigbtn ghost" onclick="restart()">첫 화면으로</button>`; }
function stageEndHTML(){
  const st=S.stage,stt=S.stats[st],mark=passMark(st);
  const nextGate=S.plan.slice(S.planPos+1).some(s=>s===1||s===2); // 아직 1·2단계가 더 남았나
  let failPids=[], nextStage=0;
  if(st===1||st===2){ if(!nextGate){ failPids=failUnion12(); nextStage=3; } }
  else if(st===3){ failPids=failedPids(3,90); nextStage=4; }
  const passed=(st<=3)?(failedPids(st,mark).length===0):true;
  const head=st<=3?stt.score+'점':stt.c+'/'+stt.t;
  let h=`<div class="endwrap"><div class="gradebanner ${passed?'pass':'fail'}"><div class="score">${head}</div>
    <div class="msg">${stt.c} / ${stt.t} 정답 · 지문별 ${mark}% 기준</div></div>`;
  if((st===1||st===2)&&nextGate){
    h+=`<button class="bigbtn" style="margin-bottom:12px" onclick="advancePlan()">다음 단계로 진행 →</button>`+navBtns();
  }else if(nextStage&&failPids.length){
    h+=`<div class="choicemsg"><b>${failTitles(failPids)}</b> 지문은 재시험 봐야 합니다.<br><b>${nextStage}단계 시험 진행해야 합니다.</b></div>
      <button class="bigbtn" style="margin-bottom:12px" onclick="proceedRemedial(${nextStage})">${nextStage}단계 지금 진행 →</button>
      <button class="bigbtn alt" style="margin-bottom:12px" onclick="goStageSelect()">나중에 (공부하고)</button>
      <button class="bigbtn ghost" onclick="restart()">첫 화면으로</button>`;
  }else if(nextStage){
    h+=`<div class="choicemsg">통과! 재시험할 지문이 없어요. 👍</div>
      <button class="bigbtn" style="margin-bottom:12px" onclick="setScreen('result')">전체 결과 보기</button>`+navBtns();
  }else{
    h+=`<button class="bigbtn" style="margin-bottom:12px" onclick="setScreen('result')">전체 결과 보기</button>`+navBtns();
  }
  return h+`</div>`;
}
function goStageSelect(){const undone=[1,2,3,4].filter(s=>!S.stats[s]);S.sel=new Set(undone.length?undone:[1,2,3,4]);S.stoppedStage=null;setScreen('stageselect');}
function proceedRemedial(target){
  if(!S.plan.includes(target)){ S.plan.push(target); S.plan.sort((a,b)=>a-b); }
  S.planPos=S.plan.indexOf(target)-1; advancePlan();
}

function renderResult(){
  backBtn.style.display='none';hsub.textContent='결과';
  sendResult();
  let rows='';
  for(let s=1;s<=4;s++){const st=S.stats[s];if(!st)continue;let badge,cls;
    if(s===4){badge='완료';cls='p';}
    else{const fp=failedPids(s,passMark(s)); if(fp.length){badge='재시험 '+fp.length+'지문';cls='f';}else{badge='통과';cls='p';}}
    rows+=`<div class="rrow"><span class="rname">${STAGE_NAME[s]}</span><span class="rscore">${s<=3?st.score+'점':st.c+'/'+st.t}</span><span class="badge ${cls}">${badge}</span></div>`;}
  const anyFail=[1,2,3].some(s=>S.stats[s]&&failedPids(s,passMark(s)).length);
  const fin=!anyFail;
  app.className='fade';
  app.innerHTML=`<div class="resultcard"><h2>학습 결과</h2>
    <div class="rmeta">${escapeHtml(S.student)}${S.cls?' · '+escapeHtml(S.cls):''} · ${S.examTitle} · 번호 ${S.orderTitles.map(t=>t.replace('번','')).join('·')}</div>
    ${rows}<div class="rfinal" style="color:${fin?'var(--ok)':'var(--no)'}">${fin?'🎉 모든 지문 통과!':'재시험 대상 지문이 있어요 — 위 표시를 확인하세요'}</div>
    <div class="copyrow"><button class="homebtn" style="flex:1" onclick="setScreen('myrec')">내 기록 보기</button><button class="homebtn" style="flex:1" onclick="restart()">처음으로</button></div>
    <div class="note" style="margin-top:14px">결과는 선생님 페이지에서 날짜별로 확인·카톡 복사할 수 있어요(다음 단계에서 연결).</div></div>`;
}
function buildResultText(){
  const n=new Date();
  const ap=n.getHours()<12?'오전':'오후'; const h12=((n.getHours()+11)%12)+1;
  const dt=`${n.getFullYear()}년 ${n.getMonth()+1}월 ${n.getDate()}일 ${ap} ${h12}:${String(n.getMinutes()).padStart(2,'0')}`;
  // 총점 = 전체 맞힌 문제 / 전체 문제 (모든 단계 합산)
  let tc=0,tt=0; for(let s=1;s<=4;s++){const st=S.stats[s];if(st){tc+=st.c;tt+=st.t;}}
  const total=tt?Math.round(tc/tt*100):0;
  const L=['[헤일리 고등학교 모의고사 결과]','이름: '+(S.student||'')+(S.cls?' ('+S.cls+')':''),'날짜: '+dt,'학년: '+(S.grade||''),'회차: '+(S.examTitle||''),'번호: '+S.orderTitles.map(t=>t.replace('번','')).join('·'),'총점: '+tc+'/'+tt+' ('+total+'점)'];
  for(let s=1;s<=4;s++){const st=S.stats[s];if(!st)continue;L.push(STAGE_NAME[s]+': '+st.c+'/'+st.t+' · 오답 '+(st.t-st.c)+'개');}
  if(S.retries)L.push('재시험: '+S.retries+'회');
  // 재시험 대상 지문 / 재시험 여부 / 통과
  const reSet={};
  [1,2,3].forEach(st=>{ if(S.stats[st]) failedPids(st,passMark(st)).forEach(p=>{ reSet[pidTitle(p)]=true; }); });
  const reTitles=Object.keys(reSet);
  L.push('─────────────');
  if(reTitles.length){
    L.push('재시험 대상 지문: '+reTitles.join(', ')+' (지문별 기준 미달)');
    L.push('재시험 여부: 필요');
    L.push('최종: 미통과 — 재시험 후 재제출');
  }else{
    L.push('재시험 대상 지문: 없음');
    L.push('재시험 여부: 불필요');
    L.push('최종: 통과 ✅');
  }
  // 틀린 문장(영어 전체) — 문장별로 모으고 어느 단계에서 틀렸는지 표시
  const wmap={};
  for(let s=1;s<=4;s++){ if(!S.stats[s])continue; const ans=S.ans[s]||{};
    Object.keys(ans).forEach(i=>{ const a=ans[i]; if(a&&a.result===false){ const it=S.items[i]; if(!it)return;
      const key=it.ptitle.replace('번','')+'-'+((it.si||0)+1);
      if(!wmap[key])wmap[key]={eng:it.correct,st:new Set(),idx:Number(i)}; wmap[key].st.add(s); } }); }
  const wkeys=Object.keys(wmap).sort((a,b)=>{const pa=a.split('-').map(Number),pb=b.split('-').map(Number);return ((pa[0]||0)-(pb[0]||0))||((pa[1]||0)-(pb[1]||0));});
  if(wkeys.length){ L.push('틀린 문장:'); wkeys.forEach(k=>{const w=wmap[k];const tag=[...w.st].sort().map(x=>x+'단계').join('·');L.push(' · '+k+' ('+tag+') '+w.eng);}); }
  else { L.push('틀린 문장: 없음'); }
  return L.join('\n');
}
function sendResult(){
  if(!S||!S.orderTitles||!S.stats||!Object.keys(S.stats).length)return;
  const payload={action:'upsert',sid:S.sid||'',student:S.student,id:S.id||'',cls:S.cls||'',grade:S.grade||'',examTitle:S.examTitle||'',numbers:S.orderTitles.map(t=>t.replace('번','')).join('·'),summary:buildResultText(),retries:S.retries||0};
  try{fetch(RESULT_API,{method:'POST',mode:'no-cors',body:JSON.stringify(payload)});}catch(e){}
}
function renderTeacher(){
  backBtn.style.display='flex';hsub.textContent='선생님 · 결과';app.className='fade';
  app.innerHTML=`<div class="intro">불러오는 중…</div>`; teacherTexts=[];
  Promise.all([apiGet({action:'pending'}).catch(()=>[]), apiGet({}).catch(()=>[])]).then(([pend,rows])=>{
    pend=pend||[]; rows=rows||[];
    let h='';
    if(pend.length){
      h+=`<div class="section-title">승인 대기 (${pend.length}명)</div>`;
      pend.forEach(p=>{ h+=`<div class="trow"><div class="thead"><b>${escapeHtml(p.name||'')}</b> <span class="tg">${escapeHtml(String(p.id||''))}</span><button class="copybtn" style="background:#1d9e75;color:#fff" onclick="approveStudent('${escapeHtml(String(p.id||''))}')">승인</button></div></div>`; });
    }
    rows.sort((a,b)=>new Date(b.time)-new Date(a.time));
    const cut=new Date(); cut.setHours(0,0,0,0); cut.setDate(cut.getDate()-1);
    const shown = teacherAll ? rows : rows.filter(r=>{const d=new Date(r.time);return !isNaN(d)&&d>=cut;});
    const toggle=`<button class="copybtn" style="background:#eef1f6;color:var(--navy);margin:0 0 10px" onclick="toggleTeacherRange()">${teacherAll?'어제·오늘만 보기':'전체 보기'}</button>`;
    h+=`<div class="section-title">${teacherAll?'전체 학습 결과 (최근순)':'어제·오늘 시험 결과'}</div>`+toggle;
    if(!shown.length){
      h+=`<div class="intro">${teacherAll?'아직 저장된 결과가 없어요.':'어제·오늘 시험 본 학생이 없어요. ‘전체 보기’를 눌러 지난 결과를 볼 수 있어요.'}</div>`;
      app.innerHTML=h; return;
    }
    const byDate={};
    shown.forEach(r=>{const d=new Date(r.time);if(isNaN(d))return;const k=`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;(byDate[k]=byDate[k]||[]).push(r);});
    Object.keys(byDate).forEach(day=>{
      h+=`<div class="tday">${day} · ${byDate[day].length}명</div>`;
      byDate[day].forEach(r=>{const i=teacherTexts.length;teacherTexts.push(r.summary||'');
        h+=`<div class="trow"><div class="thead"><b>${escapeHtml(r.student||'')}</b> <span class="tg">${escapeHtml(r.grade||'')}</span><button class="copybtn" onclick="copyText(${i})">카톡 복사</button></div>`+
           `<div class="tsub">${escapeHtml(r.examTitle||'')}${r.numbers?' · 번호 '+escapeHtml(String(r.numbers)):''}</div>`+
           `<div class="tsum">${escapeHtml(r.summary||'').replace(/\n/g,'<br>')}</div></div>`;});
    });
    app.innerHTML=h;
  }).catch(e=>{app.innerHTML=`<div class="section-title">학습 결과</div><div class="intro">결과를 불러오지 못했어요. 잠시 후 다시 시도해 주세요.</div>`;});
}
function toggleTeacherRange(){teacherAll=!teacherAll;renderTeacher();}
function copyText(i){const t=teacherTexts[i]||'';
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(()=>toast('복사됐어요')).catch(()=>fbCopy(t));}else fbCopy(t);}
function fbCopy(t){const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast('복사됐어요');}catch(e){toast('복사 실패');}document.body.removeChild(ta);}
function restart(){clearInterval(timerId);try{sendResult();}catch(e){}S=null;setScreen('login');}

let toastT;function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2200);}
backBtn.onclick=()=>{if(screen==='numbers')setScreen('exam');else if(screen==='exam')setScreen('grade');else if(screen==='grade')setScreen('login');else if(screen==='teacher')setScreen('login');else if(screen==='signup')setScreen('login');else if(screen==='tgate')setScreen('login');else if(screen==='myrec')setScreen(S&&S.id?'grade':'login');else if(screen==='stageselect')setScreen('numbers');};
(async()=>{try{const r=await fetch('exams.json',{cache:'no-store'});if(r.ok){const d=await r.json();if(Array.isArray(d)&&d.length){EXAMS=d;rebuildAvail();if(screen==='exam'||screen==='numbers')render();}}}catch(e){}})();
render();
</script>
